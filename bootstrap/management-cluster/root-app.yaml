apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: management-cluster
  namespace: argocd

spec:
  project: default

  source:
    repoURL: 'https://github.com/rizwan441/call-center-infrastructure.git'
    targetRevision: main
    path: management-cluster

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true